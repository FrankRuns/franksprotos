<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>recallfm — quiz</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #0a0a0a; color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    height: 100vh; width: 100vw; overflow: hidden;
  }
  body {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  h1 { font-size: 14px; letter-spacing: 4px; text-transform: uppercase; opacity: 0.5; margin: 0 0 48px; font-weight: 400; }
  .status { font-size: 24px; line-height: 1.4; min-height: 140px; max-width: 540px; }
  .status.listening { color: #4ade80; }
  .status.error { color: #f87171; }
  .status.correct { color: #4ade80; }
  .status.wrong { color: #f87171; }
  button {
    margin-top: 48px;
    background: #e8e8e8; color: #0a0a0a;
    border: none; border-radius: 999px;
    padding: 20px 48px;
    font-size: 18px; font-weight: 600;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { transform: scale(0.97); }
  .progress { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; opacity: 0.4; letter-spacing: 2px; }
  .round-badge { position: fixed; top: 20px; right: 20px; font-size: 11px; opacity: 0.4; letter-spacing: 2px; text-transform: uppercase; }
  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); font-size: 11px; opacity: 0.35; letter-spacing: 1px; text-transform: uppercase; }
  .results { font-size: 16px; line-height: 1.8; opacity: 0.8; max-width: 480px; text-align: left; margin-top: 24px; }
  .results .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
  .answer-grid {
    display: none;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 32px;
    width: 100%;
    max-width: 360px;
  }
  .answer-grid.show { display: grid; }
  .answer-btn {
    background: #1a1a1a;
    color: #e8e8e8;
    border: 1px solid #333;
    border-radius: 16px;
    padding: 28px 0;
    font-size: 32px;
    font-weight: 700;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    margin: 0;
    transition: background 0.1s;
  }
  .answer-btn:active { background: #333; transform: scale(0.97); }
  .repeat-btn {
    display: none;
    margin-top: 12px;
    background: transparent;
    color: #888;
    border: 1px solid #333;
    border-radius: 999px;
    padding: 14px 32px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    max-width: 360px;
  }
  .repeat-btn.show { display: inline-block; }
  .repeat-btn:active { background: #222; transform: scale(0.97); }
</style>
</head>
<body>
  <div class="progress" id="progress"></div>
  <div class="round-badge" id="round-badge"></div>
  <h1>recallfm</h1>
  <div class="status" id="status">Tap start when ready. Say A, B, C, D — or say "repeat" to hear it again.</div>
  <button id="action" onclick="onAction()">Start</button>
  <div class="answer-grid" id="answer-grid">
    <button class="answer-btn" data-letter="A">A</button>
    <button class="answer-btn" data-letter="B">B</button>
    <button class="answer-btn" data-letter="C">C</button>
    <button class="answer-btn" data-letter="D">D</button>
  </div>
  <button class="repeat-btn" id="repeat-btn">↻ Repeat</button>
  <div class="hint" id="hint"></div>

<script src="../../audio.js"></script>
<script>
const STORAGE_KEY = "recallfm_rounds_bill-gurley-knowledge-project";
const QUIZ_QUESTIONS = [
  {
    "id": "q1",
    "prompt": "What mental model does Bill Gurley say he keeps coming back to, citing a book called 'Thinking in Systems' and his board seat at the Santa Fe Institute?",
    "options": {
      "A": "First principles thinking",
      "B": "Systems thinking / complexity theory",
      "C": "Game theory",
      "D": "Behavioral economics"
    },
    "correct": "B",
    "explain": "Bill describes complex systems as multivariable, nonlinear, and hard to predict — a change in one variable can ripple into second- and third-order effects you only discover much later.",
    "type": "multiple_choice"
  },
  {
    "id": "q2",
    "prompt": "Bill's dating-site example: making profiles longer increased engagement immediately. What happened months later?",
    "options": {
      "A": "Engagement kept rising",
      "B": "It turned out to hurt conversion once people knew too much about a match upfront",
      "C": "Users complained and the feature was removed within a week",
      "D": "Nothing changed"
    },
    "correct": "B",
    "explain": "A classic second-derivative effect: the simple heuristic tested true in the short term, but had a delayed negative consequence on conversion that only showed up much later.",
    "type": "multiple_choice"
  },
  {
    "id": "q3",
    "prompt": "Which investor and longtime friend, met early in Bill's career at First Boston, introduced him to legendary investor Bill Miller and shaped his thinking on network effects?",
    "options": {
      "A": "Howard Marks",
      "B": "Mike Mauboussin",
      "C": "Peter Lynch",
      "D": "Warren Buffett"
    },
    "correct": "B",
    "explain": "Mike Mauboussin, a financial author Bill met at First Boston, became a lifelong friend and introduced him to Bill Miller, the famed value investor and longtime top Amazon shareholder.",
    "type": "multiple_choice"
  },
  {
    "id": "q4",
    "prompt": "Why does Bill think studying the history of your field is 'remarkably differentiating,' using the Pixar and Picasso examples?",
    "options": {
      "A": "It guarantees better skills than peers",
      "B": "It signals genuine passion and gives you a frame most competitors skip building",
      "C": "It's required for certification in most fields",
      "D": "It replaces the need for new-edge knowledge"
    },
    "correct": "B",
    "explain": "His point: almost no one outside literature studies the masters of their own field, so doing it shows real passion and creates contrast — like John Lasseter's encyclopedic command of animation history, or Picasso's realist mastery before he went cubist.",
    "type": "multiple_choice"
  },
  {
    "id": "q5",
    "prompt": "Bill pairs 'know the history of your field' with a second habit he says every great entrepreneur also has. What is it?",
    "options": {
      "A": "Obsessive learning at the bleeding edge of what's new",
      "B": "Daily meditation",
      "C": "Reading only biographies",
      "D": "Avoiding new tools until they're proven"
    },
    "correct": "A",
    "explain": "He calls it 'obsessive learning' — entrepreneurs riding a new wave (mobile then, AI now) go home and read everything they can because the edge keeps moving and they need to stay in the top percentile understanding it.",
    "type": "multiple_choice"
  },
  {
    "id": "q6",
    "prompt": "Comparing AI chatbots, what does Bill say he specifically uses Gemini for, because of one dataset advantage?",
    "options": {
      "A": "Coding",
      "B": "Legal research",
      "C": "Restaurant recommendations, using Google's review data to find specific dishes worth ordering",
      "D": "Stock analysis"
    },
    "correct": "C",
    "explain": "Bill likes that Gemini can mine Google's restaurant review data to tell him which specific dishes people rave about versus warn against, rather than a generic 'this place is good.'",
    "type": "multiple_choice"
  },
  {
    "id": "q7",
    "prompt": "What is Bill's central disagreement with the view that one super-intelligent model will eventually do everything, making vertical AI startups pointless?",
    "options": {
      "A": "He agrees fully with that view",
      "B": "He thinks workflows and data moats let focused vertical startups (e.g. legal AI ingesting case law) stay ahead of a general model",
      "C": "He thinks regulation will ban general models",
      "D": "He thinks only open-source models can win verticals"
    },
    "correct": "B",
    "explain": "Bill leans toward believing deep, accumulated workflow knowledge and proprietary data — like a legal AI startup that has fully ingested case law and built databases around it — are hard for a generalist model to just absorb and overtake.",
    "type": "multiple_choice"
  },
  {
    "id": "q8",
    "prompt": "What does Bill say is broken about how Institutional Shareholder Services (ISS) and similar proxy advisors operate?",
    "options": {
      "A": "They are too slow to issue recommendations",
      "B": "They score companies with an opaque black-box methodology, then sell consulting to help companies improve that same score",
      "C": "They only serve index funds",
      "D": "They have no real influence on voting outcomes"
    },
    "correct": "B",
    "explain": "Bill calls it 'more of a heist' — these services score firms on opaque criteria, won't explain the scoring, and then get paid again by the same companies who hire them to learn how to score better, drifting from shareholder interest toward rigid rule enforcement.",
    "type": "multiple_choice"
  }
];

function getRound() {
  const completed = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  if (completed.length === 0) return { num: 1, label: "Immediate" };
  if (completed.length === 1) return { num: 2, label: "24-hour" };
  if (completed.length === 2) return { num: 3, label: "1-week" };
  return { num: 4, label: "Done — all rounds complete" };
}

function shuffleArray(arr, seed) {
  let a = seed;
  const random = () => {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
  const out = arr.slice();
  for (let i = out.length - 1; i > 0; i--) {
    const j = Math.floor(random() * (i + 1));
    [out[i], out[j]] = [out[j], out[i]];
  }
  return out;
}

function shuffleQuestions(round) {
  const seed = round * 1000 + 7;
  const shuffled = shuffleArray(QUIZ_QUESTIONS, seed);
  return shuffled.map((q, i) => {
    const letters = ["A", "B", "C", "D"];
    const shuffledLetters = shuffleArray(letters, seed + i * 17);
    const newOptions = {};
    const oldToNew = {};
    letters.forEach((oldLetter, idx) => {
      const newLetter = shuffledLetters[idx];
      newOptions[newLetter] = q.options[oldLetter];
      oldToNew[oldLetter] = newLetter;
    });
    return {
      ...q,
      options: newOptions,
      correct: oldToNew[q.correct],
    };
  });
}

const round = getRound();
let phase = "idle";
let questions = [];
const answers = [];

function buildQuestionText(q, idx) {
  return `Question ${idx + 1}. ${q.prompt} Say A for ${q.options.A}. Say B for ${q.options.B}. Say C for ${q.options.C}. Say D for ${q.options.D}.`;
}
function buildCorrectText(q) { return `Correct. ${q.explain}`; }
function buildWrongText(q) { return `Not quite. The answer was ${q.correct}. ${q.options[q.correct]}. ${q.explain}`; }
function buildSkipText(q) { return `Skipping. The answer was ${q.correct}. ${q.options[q.correct]}. ${q.explain}`; }

function parseCommand(transcripts) {
  const letterMap = {
    A: ["A", "AY", "EH"],
    B: ["B", "BE", "BEE", "BEA"],
    C: ["C", "SEE", "SEA", "CEE"],
    D: ["D", "DE", "DEE", "THE"],
  };
  const repeatWords = ["REPEAT", "AGAIN", "RETRY", "ONCE", "SAY"];
  for (const t of transcripts) {
    const words = t.split(/\s+/);
    for (const w of words) {
      if (repeatWords.includes(w)) return "REPEAT";
      for (const [letter, variants] of Object.entries(letterMap)) {
        if (variants.includes(w)) return letter;
      }
    }
  }
  return null;
}

const $status = document.getElementById("status");
const $action = document.getElementById("action");
const $progress = document.getElementById("progress");
const $badge = document.getElementById("round-badge");
const $hint = document.getElementById("hint");
const $answerGrid = document.getElementById("answer-grid");
const $answerBtns = document.querySelectorAll(".answer-btn");
const $repeatBtn = document.getElementById("repeat-btn");

function setStatus(text, cls = "") {
  $status.textContent = text;
  $status.className = "status " + cls;
}
function setProgress(text) { $progress.textContent = text; }
function setHint(text) { $hint.textContent = text; }
function showAnswerButtons() {
  $answerGrid.classList.add("show");
  $repeatBtn.classList.add("show");
}
function hideAnswerButtons() {
  $answerGrid.classList.remove("show");
  $repeatBtn.classList.remove("show");
}

function getAnswerRace() {
  return new Promise((resolve, reject) => {
    let settled = false;
    let recHandle = null;

    const onAnswerTap = (e) => {
      if (settled) return;
      const letter = e.currentTarget.getAttribute("data-letter");
      settled = true;
      cleanup();
      resolve({ word: letter, source: "tap" });
    };

    const onRepeatTap = () => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve({ word: "REPEAT", source: "tap" });
    };

    const cleanup = () => {
      $answerBtns.forEach(btn => btn.removeEventListener("click", onAnswerTap));
      $repeatBtn.removeEventListener("click", onRepeatTap);
      if (recHandle && recHandle.abort) {
        try { recHandle.abort(); } catch (e) {}
      }
    };

    $answerBtns.forEach(btn => btn.addEventListener("click", onAnswerTap));
    $repeatBtn.addEventListener("click", onRepeatTap);

    recHandle = listenWithHandle();
    recHandle.then(result => {
      if (settled) return;
      settled = true;
      cleanup();
      resolve({ ...result, source: "voice" });
    }).catch(err => {
      if (settled) return;
      settled = true;
      cleanup();
      reject(err);
    });
  });
}

function listenWithHandle() {
  let rec = null;
  const promise = new Promise((resolve, reject) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      reject(new Error("Speech recognition not supported."));
      return;
    }
    rec = new SR();
    rec.lang = "en-US";
    rec.interimResults = false;
    rec.maxAlternatives = 5;
    rec.continuous = false;
    let resolved = false;
    const startTime = Date.now();
    console.log("[listen] starting recognition");

    rec.onresult = (e) => {
      if (resolved) return;
      const elapsed = Date.now() - startTime;
      const transcripts = [];
      for (let i = 0; i < e.results[0].length; i++) {
        transcripts.push(e.results[0][i].transcript.trim().toUpperCase());
      }
      console.log(`[listen] result after ${elapsed}ms:`, transcripts);
      resolved = true;
      resolve({ word: parseCommand(transcripts), raw: transcripts });
    };
    rec.onerror = (e) => {
      if (resolved) return;
      const elapsed = Date.now() - startTime;
      console.log(`[listen] error after ${elapsed}ms: ${e.error}`);
      resolved = true;
      const soft = ["aborted", "no-speech", "audio-capture"];
      if (soft.includes(e.error)) {
        resolve({ word: null, raw: [], softError: e.error });
      } else {
        reject(new Error("rec error: " + e.error));
      }
    };
    rec.onend = () => {
      if (!resolved) {
        const elapsed = Date.now() - startTime;
        console.log(`[listen] ended after ${elapsed}ms with no result`);
        resolved = true;
        resolve({ word: null, raw: [] });
      }
    };
    rec.onstart = () => console.log("[listen] onstart fired");
    rec.onspeechstart = () => console.log("[listen] speech detected");

    try {
      rec.start();
    } catch (err) {
      console.error("[listen] rec.start() threw:", err);
      if (!resolved) {
        resolved = true;
        reject(err);
      }
    }
  });
  promise.abort = () => {
    if (rec) {
      try { rec.abort(); } catch (e) {}
    }
  };
  return promise;
}

$badge.textContent = `Round ${round.num} / 3 · ${round.label}`;
if (round.num > 3) showFinalResults();

async function onAction() {
  if (phase === "idle") {
    if (round.num > 3) { window.location.reload(); return; }
    phase = "running";
    $action.style.display = "none";
    await window.recallAudio.unlock();
    questions = shuffleQuestions(round.num);
    await runQuiz();
  } else if (phase === "results") {
    setStatus(round.num === 1
      ? "Come back tomorrow. Set a calendar reminder."
      : "Come back in 6 days. Set a calendar reminder.");
    $action.style.display = "none";
  }
}

async function runQuiz() {
  await window.recallAudio.play(`round_intro_${round.num}`,
    `Round ${round.num}. 8 questions. Say A, B, C, or D. Or tap a button. Say repeat to hear the question again.`);
  setHint("Say A, B, C, D, 'repeat' — or tap");

  for (let i = 0; i < questions.length; i++) {
    setProgress(`${i + 1} / ${questions.length}`);
    const q = questions[i];
    setStatus(`Question ${i + 1}`);
    const questionKey = `quiz_r${round.num}_q${i}`;
    await window.recallAudio.play(questionKey, buildQuestionText(q, i));

    let answer = null;
    let answerSource = null;
    let attempts = 0;
    while (!answer && attempts < 6) {
      attempts++;
      await new Promise(r => setTimeout(r, 400));
      setStatus("Listening… or tap an answer", "listening");
      showAnswerButtons();
      try {
        const result = await getAnswerRace();
        if (result.word === "REPEAT") {
          hideAnswerButtons();
          setStatus("Repeating…");
          await window.recallAudio.play("repeating", "Repeating.");
          await window.recallAudio.play(questionKey, buildQuestionText(q, i));
        } else if (["A", "B", "C", "D"].includes(result.word)) {
          answer = result.word;
          answerSource = result.source;
        } else if (attempts < 6) {
          continue;
        }
      } catch (err) {
        setStatus("Speech error: " + err.message + " — tap an answer or repeat", "error");
        const tapResult = await new Promise(resolve => {
          const answerHandler = (e) => {
            const letter = e.currentTarget.getAttribute("data-letter");
            cleanupHandlers();
            resolve({ word: letter, source: "tap" });
          };
          const repeatHandler = () => {
            cleanupHandlers();
            resolve({ word: "REPEAT", source: "tap" });
          };
          const cleanupHandlers = () => {
            $answerBtns.forEach(b => b.removeEventListener("click", answerHandler));
            $repeatBtn.removeEventListener("click", repeatHandler);
          };
          $answerBtns.forEach(b => b.addEventListener("click", answerHandler));
          $repeatBtn.addEventListener("click", repeatHandler);
        });

        if (tapResult.word === "REPEAT") {
          hideAnswerButtons();
          setStatus("Repeating…");
          await window.recallAudio.play("repeating", "Repeating.");
          await window.recallAudio.play(questionKey, buildQuestionText(q, i));
        } else {
          answer = tapResult.word;
          answerSource = "tap";
        }
      }
    }

    hideAnswerButtons();
    const isCorrect = answer === q.correct;
    answers.push({
      id: q.id,
      asked: q.prompt,
      answer,
      source: answerSource,
      correct: q.correct,
      correctText: answer ? q.options[q.correct] : null,
      isCorrect,
    });

    if (answer) {
      if (isCorrect) {
        setStatus(`Correct.`, "correct");
        await window.recallAudio.play(`${questionKey}_correct`, buildCorrectText(q));
      } else {
        setStatus(`Not quite. The answer was ${q.correct}.`, "wrong");
        await window.recallAudio.play(`${questionKey}_wrong`, buildWrongText(q));
      }
    } else {
      setStatus(`Skipping. The answer was ${q.correct}.`);
      await window.recallAudio.play(`${questionKey}_skip`, buildSkipText(q));
    }
  }

  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  const score = answers.filter(a => a.isCorrect).length;
  all.push({
    round: round.num,
    label: round.label,
    ts: Date.now(),
    answers,
    score,
    total: answers.length,
  });
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));

  setProgress("");
  setHint("");
  phase = "results";

  await window.recallAudio.play(`round_complete_${round.num}`, `Round ${round.num} complete.`);
  await window.recallAudio.play(`score_${score}`, `You got ${score} out of ${answers.length}.`);

  if (round.num === 3) {
    showFinalResults();
  } else {
    const nextWhen = round.num === 1 ? "tomorrow" : "in 6 days";
    setStatus(`Round ${round.num} done: ${score} / ${answers.length}. Come back ${nextWhen}. Set a calendar reminder right now.`);
    $action.textContent = "Done";
    $action.style.display = "inline-block";
    const key = round.num === 1 ? "come_back_24h" : "come_back_1wk";
    const fallback = round.num === 1
      ? "Come back tomorrow. Set a calendar reminder before you forget."
      : "Come back in 6 days. Set a calendar reminder before you forget.";
    await window.recallAudio.play(key, fallback);
  }
}

function showFinalResults() {
  const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  if (all.length === 0) {
    setStatus("No rounds completed yet.");
    return;
  }
  let html = "<div class='results'>";
  html += "<div style='font-size: 20px; margin-bottom: 16px;'>Your decay curve:</div>";
  all.forEach(r => {
    const pct = Math.round((r.score / r.total) * 100);
    html += `<div class='row'><span>${r.label}</span><span>${r.score} / ${r.total} (${pct}%)</span></div>`;
  });
  html += "</div>";
  $status.innerHTML = html;
  $status.className = "status";
  $action.textContent = "Reset";
  $action.style.display = "inline-block";
  $action.onclick = () => {
    if (confirm("Wipe all recallfm data and start over?")) {
      localStorage.removeItem(STORAGE_KEY);
      window.location.reload();
    }
  };
}
</script>
</body>
</html>
